; PlatformIO project for the ESP32 motor controller.
; Build & flash:  pio run -t upload   |   Serial monitor:  pio device monitor
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit BNO055
    adafruit/Adafruit Unified Sensor
